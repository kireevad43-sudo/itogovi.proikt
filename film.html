<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Информация о фильме</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #141414;
            color: #ffffff;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }
        .container {
            max-width: 800px;
            width: 100%;
            background: #1f1f1f;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        .movie-card {
            display: flex;
            gap: 30px;
        }
        .poster {
            max-width: 300px;
            width: 100%;
            border-radius: 8px;
            object-fit: cover;
            background-color: #333;
            min-height: 450px;
        }
        .info {
            flex: 1;
        }
        h1 {
            margin-top: 0;
            font-size: 2.5rem;
            color: #e50914;
        }
        .meta {
            color: #aaa;
            font-size: 0.9rem;
            margin-bottom: 20px;
        }
        .overview {
            line-height: 1.6;
            font-size: 1.1rem;
            color: #ddd;
        }
        .loader {
            text-align: center;
            font-size: 1.5rem;
            padding: 50px 0;
        }
        .error-message {
            color: #ff4a4a;
            text-align: center;
            font-size: 1.2rem;
        }
       @media (max-width: 600px) {
            .movie-card {
                flex-direction: column;
                align-items: center;
            }
            .poster {
                max-width: 100%;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <div id="loader" class="loader">Загрузка информации о фильме...</div>
    
    <div id="error" class="error-message" style="display: none;"></div>

    <div id="movie-content" class="movie-card" style="display: none;">
        <img id="movie-poster" class="poster" src="" alt="Постер фильма">
        <div class="info">
            <h1 id="movie-title"></h1>
            <div class="meta">
                <span id="movie-date"></span> | 
                <span id="movie-genres"></span> | 
                <strong>Рейтинг: <span id="movie-rating"></span>/10</strong>
            </div>
            <p id="movie-overview" class="overview"></p>
        </div>
    </div>
</div>

<script>
    const urlParams = new URLSearchParams(window.location.search);
    const movieId = urlParams.get('id');

    const loaderEl = document.getElementById('loader');
    const errorEl = document.getElementById('error');
    const contentEl = document.getElementById('movie-content');

    if (!movieId) {
        showError('Ошибка: ID фильма не указан в URL');
    } else {
        fetchMovieDetails(movieId);
    }

    async function fetchMovieDetails(id) {
        const API_KEY = '74d8f6c9-ddea-43ed-923a-5dd3ad160bd8'; 
        const url = `https://kinopoiskapiunofficial.tech/api/v2.2/films/${id}`;

        try {
            const response = await fetch(url, {
                method: 'GET',
                headers: {
                    'X-API-KEY': API_KEY,
                    'Content-Type': 'application/json',
                },
            });
            
            if (!response.ok) {
                if (response.status === 404) throw new Error('Фильм не найден в базе Кинопоиска.');
                throw new Error('Не удалось загрузить данные.');
            }

            const movieData = await response.json();
            renderMovie(movieData);

        } catch (error) {
            showError(error.message);
        }
    }

    function renderMovie(movie) {
        document.getElementById('movie-title').textContent = movie.nameRu || movie.nameOriginal;
        document.getElementById('movie-overview').textContent = movie.description || 'Описание отсутствует.';
        document.getElementById('movie-date').textContent = movie.year || 'Год неизвестен';
        
        const rating = movie.ratingKinopoisk || movie.ratingImdb || '0';
        document.getElementById('movie-rating').textContent = rating;
        const genres = movie.genres ? movie.genres.map(g => g.genre).join(', ') : 'Жанры не указаны';
        document.getElementById('movie-genres').textContent = genres;

        const posterEl = document.getElementById('movie-poster');
        if (movie.posterUrl) {
            posterEl.src = movie.posterUrl;
        } else {
            posterEl.src = 'https://via.placeholder.com/300x450?text=Нет+постера';
        }

        loaderEl.style.display = 'none';
        contentEl.style.display = 'flex';
        contentEl.setAttribute("style", "display: flex;");
    }

    function showError(message) {
        loaderEl.style.display = 'none';
        errorEl.textContent = message;
        errorEl.style.display = 'block';
    }
</script>
</body>
</html>
